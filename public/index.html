<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#050507">
    <title>RZmusic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        html, body { background: #050507; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .fill-current { fill: currentColor; }
        .filter-tab.active { background: rgba(255,255,255,0.92) !important; color: black !important; box-shadow: 0 4px 20px rgba(255,255,255,0.15); }

        /* ===== Black Glass design system (monochrome, no green) ===== */
        .app-bg{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none;background:#050507;}
        .app-bg span{position:absolute;border-radius:50%;filter:blur(50px);animation:orbBreathe 8s ease-in-out infinite;}
        .app-bg span:nth-child(1){width:280px;height:280px;background:rgba(255,255,255,0.10);top:-70px;left:-60px;}
        .app-bg span:nth-child(2){width:320px;height:320px;background:rgba(150,156,168,0.18);bottom:40px;right:-90px;animation-delay:2s;}
        .app-bg span:nth-child(3){width:240px;height:240px;background:rgba(255,255,255,0.05);top:45%;left:35%;animation-delay:4s;}
        @keyframes orbBreathe{0%,100%{opacity:.6;transform:scale(1);}50%{opacity:1;transform:scale(1.15);}}
        /* Pause animasi dekoratif (gak ngubah tampilan, cuma hemat CPU/baterai) pas tab disembunyikan */
        html.tab-hidden .app-bg span,
        html.tab-hidden .chrome-text,
        html.tab-hidden .btn-chrome::after,
        html.tab-hidden .shine-sweep::after{animation-play-state:paused;}

        .glass{background:rgba(255,255,255,0.045);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);}
        .glass-hover{transition:background .2s ease, border-color .2s ease;}
        .glass-hover:hover{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.14);}
        .glass-strong{background:rgba(8,8,11,0.72);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,0.09);}
        .glass-input{background:rgba(255,255,255,0.05);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.1);}
        .glass-input:focus-within, .glass-input:focus{border-color:rgba(210,213,218,0.45);}
        .glass-pane{background:rgba(6,6,8,0.55);backdrop-filter:blur(34px);-webkit-backdrop-filter:blur(34px);}
        .glass-edge{border:1px solid rgba(255,255,255,0.08);}

        /* ===== Optimasi panel full-screen (FullPlayer & Lirik) ===== */
        /* backdrop-filter di elemen full-screen yang lagi di-translate itu paling berat
           buat GPU mobile (browser harus re-sample seluruh area di belakangnya tiap frame).
           Solusinya: pas lagi animasi slide buka/tutup, ganti blur jadi background solid dulu
           (selisihnya nyaris gak kelihatan karena transisinya cepat), baru blur asli dipasang
           lagi begitu animasi selesai. */
        #full-player, #lyrics-overlay{will-change:transform;}
        #full-player.fp-animating, #lyrics-overlay.fp-animating{
            backdrop-filter:none !important; -webkit-backdrop-filter:none !important;
            background:rgba(5,5,7,0.97) !important;
        }
        /* Highlight baris lirik pakai class (bukan tulis 4 inline-style per node tiap pindah
           baris) — browser jauh lebih ringan toggle 1 class daripada nulis ulang banyak
           properti style satu-satu di puluhan elemen sekaligus. */
        .lyric-line{color:#6b7280;font-size:0.85rem;line-height:2;font-weight:400;opacity:0.5;transition:color .25s ease,opacity .25s ease;}
        .lyric-line.lyric-past{color:#4b5563;opacity:0.3;}
        .lyric-line.lyric-active{color:#fff;font-size:1rem;font-weight:700;opacity:1;}

        /* Chrome / glossy gray accent — replaces all green accents */
        .chrome-text{background:linear-gradient(110deg,#8b9099 0%,#f4f5f6 30%,#ffffff 45%,#aab0b8 65%,#8b9099 100%);background-size:250% auto;-webkit-background-clip:text;background-clip:text;color:transparent;animation:chromeSheen 5s linear infinite;}
        @keyframes chromeSheen{0%{background-position:0% 50%;}100%{background-position:200% 50%;}}

        .btn-chrome{position:relative;overflow:hidden;background:linear-gradient(135deg,#f2f3f4,#aab0b8);color:#0a0a0c;box-shadow:0 8px 22px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.6);}
        .btn-chrome:hover{background:linear-gradient(135deg,#ffffff,#bcc1c7);}
        .btn-chrome::after{content:'';position:absolute;top:0;left:-160%;width:55%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,0.65),transparent);transform:skewX(-20deg);animation:chromeSweep 3.2s ease-in-out infinite;}
        @keyframes chromeSweep{0%{left:-160%;}55%{left:160%;}100%{left:160%;}}

        .shine-sweep{position:relative;}
        .shine-sweep::after{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(115deg,transparent 35%,rgba(255,255,255,0.28) 48%,transparent 62%);background-size:250% 250%;animation:sheenMove 4.5s ease-in-out infinite;pointer-events:none;}
        @keyframes sheenMove{0%{background-position:220% 0%;}100%{background-position:-60% 0%;}}

        .nav-blur { background: rgba(6,6,9,0.55); backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px); border-top: 1px solid rgba(255,255,255,0.08); }
        .artist-photo { width:120px; height:120px; border-radius:50%; object-fit:cover; border:3px solid rgba(255,255,255,0.85); box-shadow:0 10px 40px rgba(0,0,0,0.6); background:rgba(255,255,255,0.08); }
        @keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
        .animate-slide-up{animation:slideUp 0.3s ease-out forwards}

        /* ===== SPLASH SCREEN - GREEN GLOW ===== */
        #splash-screen {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: radial-gradient(circle at 50% 45%, #0a1a10 0%, #050507 70%);
            transition: opacity .6s ease, visibility .6s ease;
        }
        #splash-screen.hide { opacity: 0; visibility: hidden; pointer-events: none; }

        .splash-rings {
            position: relative;
            width: 300px; height: 300px;
            display: flex; align-items: center; justify-content: center;
        }
        .splash-rings span {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%;
            border: 1px solid rgba(30,215,96,0.3);
            animation: splashWave 2.8s cubic-bezier(.4,0,.2,1) infinite;
        }
        .splash-rings span:nth-child(2) { animation-delay: .7s; }
        .splash-rings span:nth-child(3) { animation-delay: 1.4s; }
        .splash-rings span:nth-child(4) { animation-delay: 2.1s; }

        @keyframes splashWave {
            0% { transform: scale(.3); opacity: 0; }
            15% { opacity: .7; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .splash-disc {
            position: absolute;
            width: 200px; height: 200px;
            border-radius: 50%;
            background: repeating-radial-gradient(circle, rgba(30,215,96,0.05) 0px, rgba(30,215,96,0.05) 1px, transparent 2px, transparent 7px);
            box-shadow: 0 0 60px rgba(30,215,96,0.15), inset 0 0 40px rgba(0,0,0,0.7);
            animation: splashSpin 7s linear infinite;
        }
        .splash-disc::before {
            content: '';
            position: absolute; inset: -10px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, rgba(30,215,96,0.3), rgba(30,215,96,0.6), rgba(30,215,96,0.3), transparent);
            animation: splashShimmer 3s linear infinite;
            filter: blur(15px); z-index: -1;
        }

        @keyframes splashSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes splashShimmer { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .splash-logo-wrap {
            position: relative;
            width: 170px; height: 170px;
            border-radius: 50%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            border: 2px solid rgba(30,215,96,0.4);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            animation: splashPulse 2.4s ease-in-out infinite;
            z-index: 2;
        }
        .splash-logo-wrap img {
            width: 85%; height: 85%;
            object-fit: cover;
            border-radius: 50%;
            filter: drop-shadow(0 4px 14px rgba(30,215,96,0.3));
        }
        .splash-logo-wrap::after {
            content: '';
            position: absolute; inset: 0;
            border-radius: 50%;
            background: linear-gradient(115deg, transparent 35%, rgba(255,255,255,0.2) 48%, transparent 62%);
            background-size: 250% 250%;
            animation: sheenMove 4.5s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes splashPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(30,215,96,0.2), inset 0 1px 0 rgba(30,215,96,0.2); }
            50% { box-shadow: 0 0 60px rgba(30,215,96,0.4), inset 0 1px 0 rgba(30,215,96,0.4); }
        }

        .splash-title { margin-top: 30px; font-weight: 900; font-size: 1.1rem; letter-spacing: .06em; }
        .splash-sub { margin-top: 6px; font-size: .7rem; color: #7c828c; letter-spacing: .1em; text-transform: uppercase; opacity: .8; }
        .splash-bar { margin-top: 24px; width: 120px; height: 2px; border-radius: 2px; background: rgba(30,215,96,0.15); overflow: hidden; }
        .splash-bar i { display: block; height: 100%; width: 40%; background: linear-gradient(90deg, transparent, #1ed760, transparent); animation: splashBar 1.4s ease-in-out infinite; }
        @keyframes splashBar { 0% { transform: translateX(-100%); } 100% { transform: translateX(250%); } }
    </style>
</head>
<body class="h-[100dvh] w-full bg-transparent text-white font-sans overflow-hidden flex flex-col">
    <div class="app-bg"><span></span><span></span><span></span></div>

    <div id="splash-screen">
        <div class="splash-rings"><span></span><span></span><span></span><span></span>
            <div class="splash-disc"></div>
            <div class="splash-logo-wrap shine-sweep"><img src="logo.png" alt="logo" onerror="this.style.display='none'" /></div>
        </div>
        <div class="splash-title chrome-text">RZmusic</div>
        <div class="splash-sub">Menyiapkan musikmu</div>
        <div class="splash-bar"><i></i></div>
    </div>

    <div class="flex-1 overflow-y-auto pb-28 hide-scrollbar" id="main-area">
        <div id="view-home"></div>
        <div id="view-search" style="display:none;"></div>
        <div id="view-library" style="display:none;"></div>
        <div id="view-dev" style="display:none;"></div>
    </div>

    <div id="nav-container"></div>
    <div id="mini-container"></div>
    <div id="full-container"></div>
    <div id="lyrics-container"></div>
    <div id="artist-container"></div>
    <div id="yt-player" style="position:absolute;top:-9999px;left:-9999px;width:1px;height:1px;"></div>
    <audio id="audio-player" preload="auto" style="display:none;"></audio>

    <script src="player.js"></script>
    <script src="home.js"></script>
    <script src="search.js"></script>
    <script src="miniplayer.js"></script>
    <script src="fullplayer.js"></script>
    <script src="artist.js"></script>
    <script src="app.js"></script>
    <script>(function () {
  function blockEruda() {
    if (window.eruda) {
      try { window.eruda.destroy(); } catch (e) {}
      try { delete window.eruda; } catch (e) { window.eruda = undefined; }
    }

    document.querySelectorAll(
      '#eruda, .eruda-container, .eruda-entry-btn, .eruda-dev-tools'
    ).forEach(el => el.remove());

    document.querySelectorAll('script[src]').forEach(script => {
      if (script.src.toLowerCase().includes('eruda')) {
        script.remove();
      }
    });
  }

  blockEruda();
  // Cek berkala aja (2 detik), TANPA MutationObserver subtree.
  // MutationObserver subtree:true di document.documentElement sebelumnya
  // nge-trigger blockEruda() di SETIAP perubahan DOM seluruh app (render
  // home/search, popup, lyrics, bahkan tiap lucide.createIcons() ganti
  // ikon) — itu beban utama yang bikin app kerasa lag/berat.
  setInterval(blockEruda, 2000);

  // Hemat CPU/baterai pas tab di background: pause animasi dekoratif
  // (orb background, sheen text/tombol) yang gak perlu jalan terus.
  document.addEventListener('visibilitychange', function () {
    document.documentElement.classList.toggle('tab-hidden', document.hidden);
  });
})();</script>
</body>

</html>
